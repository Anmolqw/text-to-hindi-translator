name: Translate Text File to Hindi and Email

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'uploads/**/*.txt'

permissions:
  contents: read
  pull-requests: read

jobs:
  translate-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get changed txt files
        id: changed-files
        run: |
          FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'uploads/*.txt' || \
                  git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD -- 'uploads/*.txt')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Get PR author email
        id: pr-author
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const user = await github.rest.users.getByUsername({
              username: pr.data.user.login
            });
            core.setOutput('email', user.data.email || '');
            core.setOutput('username', pr.data.user.login);

      - name: Translate and send email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECIPIENT_EMAIL: ${{ steps.pr-author.outputs.email }}
          PR_AUTHOR: ${{ steps.pr-author.outputs.username }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
        run: python scripts/translate_and_email.py
